<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lili &amp; Bence — Esküvő</title>
  <meta name="description" content="Lili és Bence esküvője — minden fontos információ egy helyen.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
</head>
<body>

  <!-- ===================== NAVIGATION ===================== -->
  <header class="nav" id="nav">
    <a href="#top" class="nav-brand" id="nav-brand">L &amp; B</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menü megnyitása" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-links" id="nav-links">
      <a href="#story">Történetünk</a>
      <a href="#details">Részletek</a>
      <a href="#schedule">Program</a>
      <a href="#venue">Helyszín</a>
      <a href="#accommodation">Szállás</a>
      <a href="#faq">GYIK</a>
      <a href="#rsvp" class="nav-rsvp">Visszajelzés</a>
    </nav>
  </header>

  <!-- ===================== HERO ===================== -->
  <section class="hero" id="top">
    <div class="hero-stars" aria-hidden="true">
      <span style="top:12%;left:16%">✦</span>
      <span style="top:9%;left:47%;font-size:0.7em">✧</span>
      <span style="top:15%;left:78%">✦</span>
      <span style="top:32%;left:8%;font-size:0.65em">✧</span>
      <span style="top:28%;left:90%;font-size:0.8em">✦</span>
      <span style="top:58%;left:12%;font-size:0.75em">✦</span>
      <span style="top:64%;left:88%;font-size:0.6em">✧</span>
      <span style="top:82%;left:22%;font-size:0.6em">✧</span>
      <span style="top:78%;left:74%">✦</span>
    </div>
    <div class="hero-inner">
      <p class="hero-eyebrow" id="hero-eyebrow"></p>
      <h1 class="hero-names" id="hero-names"></h1>
      <div class="hero-divider"><span>✦</span></div>
      <p class="hero-date-stylized" id="hero-date-stylized"></p>
      <p class="hero-date" id="hero-date"></p>
      <p class="hero-location" id="hero-location"></p>
      <p class="hero-invite" id="hero-invite"></p>
      <div class="countdown" id="countdown" aria-label="Visszaszámlálás az esküvőig">
        <div class="countdown-item"><span id="cd-days">–</span><small>Nap</small></div>
        <div class="countdown-item"><span id="cd-hours">–</span><small>Óra</small></div>
        <div class="countdown-item"><span id="cd-mins">–</span><small>Perc</small></div>
        <div class="countdown-item"><span id="cd-secs">–</span><small>Másodperc</small></div>
      </div>
      <a href="#rsvp" class="btn btn-primary" id="hero-cta"></a>
    </div>
    <a href="#story" class="hero-scroll" aria-label="Görgetés lefelé">▾</a>
  </section>

  <!-- ===================== OUR STORY ===================== -->
  <section class="section" id="story">
    <div class="container narrow">
      <h2 class="section-title" id="story-title"></h2>
      <div class="section-divider"><span>✦</span></div>
      <div class="story-photo placeholder-photo">
        <span>A pár fotója</span>
      </div>
      <div class="story-text" id="story-text"></div>
    </div>
  </section>

  <!-- ===================== DETAILS (CEREMONY / RECEPTION) ===================== -->
  <section class="section section-alt" id="details">
    <div class="container">
      <h2 class="section-title" id="details-title"></h2>
      <div class="section-divider"><span>✦</span></div>
      <div class="cards" id="details-cards"></div>
    </div>
  </section>

  <!-- ===================== SCHEDULE ===================== -->
  <section class="section" id="schedule">
    <div class="container narrow">
      <h2 class="section-title" id="schedule-title"></h2>
      <div class="section-divider"><span>✦</span></div>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>

  <!-- ===================== VENUE ===================== -->
  <section class="section section-alt" id="venue">
    <div class="container">
      <h2 class="section-title" id="venue-title"></h2>
      <div class="section-divider"><span>✦</span></div>
      <div class="cards" id="venue-cards"></div>
    </div>
  </section>

  <!-- ===================== RSVP ===================== -->
  <section class="section rsvp" id="rsvp">
    <div class="container narrow center">
      <h2 class="section-title" id="rsvp-title"></h2>
      <div class="section-divider"><span>✦</span></div>
      <p id="rsvp-text"></p>
      <p class="rsvp-deadline" id="rsvp-deadline"></p>
      <a id="rsvp-button" class="btn btn-primary" target="_blank" rel="noopener"></a>
      <p class="rsvp-contact" id="rsvp-contact"></p>
    </div>
  </section>

  <!-- ===================== ACCOMMODATION ===================== -->
  <section class="section section-alt" id="accommodation">
    <div class="container">
      <h2 class="section-title" id="accommodation-title"></h2>
      <div class="section-divider"><span>✦</span></div>
      <p class="section-intro" id="accommodation-intro"></p>
      <div class="cards" id="accommodation-cards"></div>
    </div>
  </section>

  <!-- ===================== FAQ ===================== -->
  <section class="section" id="faq">
    <div class="container narrow">
      <h2 class="section-title" id="faq-title"></h2>
      <div class="section-divider"><span>✦</span></div>
      <div class="faq-list" id="faq-list"></div>
    </div>
  </section>

  <!-- ===================== FOOTER ===================== -->
  <footer class="footer">
    <p class="footer-names" id="footer-names"></p>
    <p class="footer-note" id="footer-note"></p>
  </footer>

  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
